<!DOCTYPE html>
<html>
<head>
<title>calculator</title>
</head>
<body>
	Enter the first number: <input type="number" id="num1"><br><br>
	Entr the operator: <input type="text" maxlength=1 id="operator"><br><br>
	Enter the second number: <input type="number" id="num2"><br><br>
	<input type="button" value="submit" id="btn">
	<p id="out"></p>
<script>
	document.getElementById("btn").addEventListener("click",function(){
		let a=Number(document.getElementById("num1").value);
		let b=document.getElementById("operator").value;
		let c=Number(document.getElementById("num2").value);
		let result;
		switch(b)
		{
			case '+':
				result=a+c;
				break;
			case '-':
				result=a-c;
				break;
			case '*':
				result=a*c;
				break;
			case '/':
				result=a/c;
				break;
		};
		document.getElementById("out").innerHTML="Result:"+result;
	});
</script>
</body>
</html>
